# Tenant plane, scoped to THIS hub's region ({{ .Values.region }}).
# Now a matrix: child-1 = this region's cluster registry, child-2 = the tenant
# leaves living on those clusters. Tenant paths are unchanged
# (tenants/<cluster>/<tenant>/<app>) — the registry join is what scopes them,
# and it also exposes {cloud, role} params to tenant apps for future tiers.
{{- if not .Values.region }}{{ fail "region is required" }}{{- end }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - git:
              repoURL: {{ .Values.repoURL }}
              revision: {{ .Values.revision }}
              pathParamPrefix: cluster
              files:
                - path: "clusters/{{ .Values.region }}/*/config.yaml"
          - git:
              repoURL: {{ .Values.repoURL }}
              revision: {{ .Values.revision }}
              files:
                - path: {{ `tenants/{{.cluster.path.basename}}/*/*/config.yaml` | quote }}
  template:
    metadata:
      # segments: 0=tenants 1=<cluster> 2=<tenant> 3=<app>  (unchanged)
      name: {{ `{{index .path.segments 1}}-{{index .path.segments 2}}-{{index .path.segments 3}}` | quote }}
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: {{ `{{.appRepoURL}}` | quote }}
          targetRevision: {{ `{{.chartRevision}}` | quote }}
          path: {{ `{{.helmPath}}` | quote }}
          helm:
            # per-cluster/per-app base files are optional — skip any that don't exist
            ignoreMissingValueFiles: true
            valueFiles:
              # ordered low -> high precedence (last wins)
              - {{ `$values/tenants/_base/values.yaml` | quote }}
              - {{ `$values/tenants/_base/{{index .path.segments 3}}/values.yaml` | quote }}
              - {{ `$values/tenants/{{index .path.segments 1}}/_base/values.yaml` | quote }}
              - {{ `$values/tenants/{{index .path.segments 1}}/_base/{{index .path.segments 3}}/values.yaml` | quote }}
              - {{ `$values/{{.path.path}}/values.yaml` | quote }}
        - repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.revision }}
          ref: values
      destination:
        name: {{ `{{index .path.segments 1}}` | quote }}
        namespace: {{ `tenant-{{index .path.segments 2}}` | quote }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            app.kubernetes.io/managed-by: argocd
        syncOptions:
          - CreateNamespace=true
