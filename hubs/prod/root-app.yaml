# Bootstrap for the PROD hub (ArgoCD on gitops-c3, manages the prod region —
# including gitops-c3 itself, registered in its own ArgoCD as a named cluster).
# Plain directory source — the appsets in hubs/prod/appsets/ are exactly what runs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kanzalqalandri/platform-config
    targetRevision: main
    path: hubs/prod/appsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
