# ONE ApplicationSet for the whole dev fleet, applied to the CENTRAL ArgoCD (hub).
# Each tenant/app's config.yaml declares `destinationCluster`; this appset routes
# the Application to that registered cluster. Scales to N clusters with NO new
# appset — adding a cluster = register its cluster Secret; moving a tenant to a
# different cluster = change one field.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-fleet
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/kanzalqalandri/platform-config
        revision: HEAD
        files:
          - path: "envs/dev/*/*/config.yaml"   # envs/dev/<tenant>/<app>/config.yaml
  template:
    metadata:
      # segments: 0=envs 1=dev 2=<tenant> 3=<app>
      name: "dev-{{index .path.segments 2}}-{{index .path.segments 3}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{.appRepoURL}}"
          targetRevision: "{{.chartRevision}}"
          path: "{{.helmPath}}"
          helm:
            valueFiles:
              - "$values/envs/dev/_base/values.yaml"
              - "$values/envs/dev/_base/{{index .path.segments 3}}/values.yaml"
              - "$values/{{.path.path}}/values.yaml"
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: HEAD
          ref: values
      destination:
        name: "{{.destinationCluster}}"          # <-- routes to the registered cluster
        namespace: "dev-{{index .path.segments 2}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            app.kubernetes.io/managed-by: argocd
        syncOptions:
          - CreateNamespace=true
