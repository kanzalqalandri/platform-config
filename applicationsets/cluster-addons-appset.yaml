# Cluster ADD-ON plane — CLUSTER-TYPE aware. What runs on a cluster is derived
# from its entry in the clusters/ registry (cloud + role), not from per-cluster
# addon directories:
#
#   clusters/<cluster>/config.yaml              -> {cloud, role, addonOverrides?}
#   addons/fleet/<addon>/config.yaml              -> runs on EVERY cluster
#   addons/roles/<role>/<addon>/config.yaml     -> runs on every cluster of that role
#   addons/clouds/<cloud>/<addon>/config.yaml   -> runs on every cluster of that cloud
#   addons/oneoffs/<cluster>/<app>/config.yaml     -> ONE-OFF: runs on that ONE named cluster
#
# The fleet/role/cloud/oneoffs tiers are a specificity ladder (least -> most specific);
# "oneoffs" is the most-specific rung: placement by cluster NAME, for a platform/ops
# component that belongs on exactly one cluster. Do NOT abuse roles/ for this — a
# second cluster of that role would silently pick the app up too.
#
# The matrix generator joins them: child 1 emits one param set per cluster;
# child 2's file patterns are TEMPLATED with child 1's {role, cloud}, so each
# cluster only picks up the addon sets that apply to it.
#
#   Onboard a cluster              = 1 registry file + 1 cluster Secret in the hub
#   Add an addon to all satellites = 1 file under addons/roles/satellite/
#   Pin a version on ONE cluster   = addonOverrides.<addon>.chartVersion in its registry file
#
# Values precedence (last wins), assembled via ignoreMissingValueFiles:
#   addons/_base/<addon>/values.yaml                 fleet-wide (define once)
#   <dir of the matched config.yaml>/values.yaml     tier-level (fleet / role / cloud / oneoffs)
#   addons/overrides/<cluster>/<addon>/values.yaml per-cluster escape hatch
# (For a "oneoffs" one-off, its values.yaml lives next to its config.yaml, so the
#  tier-level entry above already picks it up.)
#
# NOTE: goTemplateOptions missingkey=error is deliberately OMITTED — the
# addonOverrides key in registry files is optional.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          # 1) cluster registry: one param set per cluster -> {cloud, role, addonOverrides?}
          - git:
              repoURL: https://github.com/kanzalqalandri/platform-config
              revision: main
              pathParamPrefix: cluster     # both children are git file gens; keeps their .path params distinct
              files:
                - path: "clusters/*/config.yaml"
          # 2) the addon sets that apply to THAT cluster (paths templated from child 1)
          - git:
              repoURL: https://github.com/kanzalqalandri/platform-config
              revision: main
              files:
                - path: "addons/fleet/*/config.yaml"
                - path: "addons/roles/{{.role}}/*/config.yaml"
                - path: "addons/clouds/{{.cloud}}/*/config.yaml"
                - path: "addons/oneoffs/{{.cluster.path.basename}}/*/config.yaml"   # one-off: this cluster only
  template:
    metadata:
      # cluster name = registry dir basename; addon name = config.yaml dir basename
      name: "addon-{{.cluster.path.basename}}-{{.path.basename}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{.syncWave | default "0"}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        # Source 1: upstream Helm chart (repo/chart/version from the addon's config.yaml)
        - repoURL: "{{.chartRepo}}"
          chart: "{{.chart}}"
          # tier default, unless this cluster's registry file pins the addon
          targetRevision: '{{ dig .path.basename "chartVersion" .chartVersion (.addonOverrides | default dict) }}'
          helm:
            # only the _base file is expected to exist; the rest are optional layers
            ignoreMissingValueFiles: true
            valueFiles:
              # ordered low -> high precedence (last wins)
              - "$values/addons/_base/{{.path.basename}}/values.yaml"
              - "$values/{{.path.path}}/values.yaml"
              - "$values/addons/overrides/{{.cluster.path.basename}}/{{.path.basename}}/values.yaml"
        # Source 2: our values repo (ref only — a ref source must not set chart)
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: main
          ref: values
      destination:
        name: "{{.cluster.path.basename}}"   # route to the cluster from the registry path
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true             # required: large CRDs (cert-manager) exceed the annotation limit
