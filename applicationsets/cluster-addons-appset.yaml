# Cluster ADD-ON plane — CLUSTER-TYPE aware. addons/ is split by CONCERN:
#   addons/charts/   -> WHAT runs & WHERE (config.yaml: chart repo/version/ns)
#   addons/values/   -> HOW it's tuned    (values.yaml only)
# What runs on a cluster is derived from its entry in the clusters/ registry
# (cloud + role), joined with the charts/ placement tiers:
#
#   clusters/<cluster>/config.yaml                     -> {cloud, role, addonOverrides?}
#   addons/charts/fleet/<addon>/config.yaml            -> runs on EVERY cluster
#   addons/charts/roles/<role>/<addon>/config.yaml     -> runs on every cluster of that role
#   addons/charts/clouds/<cloud>/<addon>/config.yaml   -> runs on every cluster of that cloud
#   addons/charts/oneoffs/<cluster>/<app>/config.yaml  -> ONE-OFF: runs on that ONE named cluster
#
# The fleet/role/cloud/oneoffs tiers are a specificity ladder (least -> most specific);
# "oneoffs" is the most-specific rung: placement by cluster NAME, for a platform/ops
# component that belongs on exactly one cluster. Do NOT abuse roles/ for this — a
# second cluster of that role would silently pick the app up too.
#
# The matrix generator joins them: child 1 emits one param set per cluster;
# child 2's file patterns are TEMPLATED with child 1's {role, cloud}, so each
# cluster only picks up the addon sets that apply to it.
#
#   Onboard a cluster              = 1 registry file + 1 cluster Secret in the hub
#   Add an addon to all satellites = 1 file under addons/charts/roles/satellite/
#   Pin a version on ONE cluster   = addonOverrides.<addon>.chartVersion in its registry file
#
# Values precedence (last wins), assembled via ignoreMissingValueFiles. Every layer
# lives under addons/values/, mirroring the charts/ tiers:
#   addons/values/defaults/<addon>/values.yaml            addon defaults (define once)
#   addons/values/<same tier path as the chart>/values.yaml   tier-level (fleet/role/cloud/oneoffs)
#   addons/values/clusters/<cluster>/<addon>/values.yaml  per-cluster escape hatch
# (The tier-level path is the chart's own dir with addons/charts/ swapped to addons/values/.)
#
# NOTE: goTemplateOptions missingkey=error is deliberately OMITTED — the
# addonOverrides key in registry files is optional.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          # 1) cluster registry: one param set per cluster -> {cloud, role, addonOverrides?}
          - git:
              repoURL: https://github.com/kanzalqalandri/platform-config
              revision: main
              pathParamPrefix: cluster     # both children are git file gens; keeps their .path params distinct
              files:
                - path: "clusters/*/config.yaml"
          # 2) the addon sets that apply to THAT cluster (paths templated from child 1)
          - git:
              repoURL: https://github.com/kanzalqalandri/platform-config
              revision: main
              files:
                - path: "addons/charts/fleet/*/config.yaml"
                - path: "addons/charts/roles/{{.role}}/*/config.yaml"
                - path: "addons/charts/clouds/{{.cloud}}/*/config.yaml"
                - path: "addons/charts/oneoffs/{{.cluster.path.basename}}/*/config.yaml"   # one-off: this cluster only
  template:
    metadata:
      # cluster name = registry dir basename; addon name = config.yaml dir basename
      name: "addon-{{.cluster.path.basename}}-{{.path.basename}}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{.syncWave | default "0"}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        # Source 1: upstream Helm chart (repo/chart/version from the addon's config.yaml)
        - repoURL: "{{.chartRepo}}"
          chart: "{{.chart}}"
          # tier default, unless this cluster's registry file pins the addon
          targetRevision: '{{ dig .path.basename "chartVersion" .chartVersion (.addonOverrides | default dict) }}'
          helm:
            # every value file is optional (ignoreMissingValueFiles); layers absent for
            # a given addon are simply skipped
            ignoreMissingValueFiles: true
            valueFiles:
              # ordered low -> high precedence (last wins). All under addons/values/.
              - "$values/addons/values/defaults/{{.path.basename}}/values.yaml"                                # addon defaults
              - '$values/{{ .path.path | replace "addons/charts/" "addons/values/" }}/values.yaml'            # tier-level (mirrors the chart path)
              - "$values/addons/values/clusters/{{.cluster.path.basename}}/{{.path.basename}}/values.yaml"     # per-cluster
        # Source 2: our values repo (ref only — a ref source must not set chart)
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: main
          ref: values
      destination:
        name: "{{.cluster.path.basename}}"   # route to the cluster from the registry path
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true             # required: large CRDs (cert-manager) exceed the annotation limit
