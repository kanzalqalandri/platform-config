# Cluster ADD-ON plane — mirrors the tenants layout: addons/<cluster>/<addon>/.
# One appset for the whole fleet, applied to the central hub. Each
# addons/<cluster>/<addon>/config.yaml becomes one Application, sourced from an
# UPSTREAM Helm chart with our values layered on top (common _base + optional
# per-cluster override), deployed to the cluster named in the path.
#   Enable an add-on on a cluster = add addons/<cluster>/<addon>/config.yaml
#   Common values (define once)   = addons/_base/<addon>/values.yaml
#   Per-cluster override (opt.)   = addons/<cluster>/<addon>/values.yaml
#   Pin a per-cluster version     = chartVersion in that cluster's config.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/kanzalqalandri/platform-config
        revision: HEAD
        files:
          - path: "addons/*/*/config.yaml"     # addons/<cluster>/<addon>/config.yaml (_base has no config.yaml, so it is skipped)
  template:
    metadata:
      # segments: 0=addons 1=<cluster> 2=<addon>
      name: "addon-{{index .path.segments 1}}-{{index .path.segments 2}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        # Source 1: upstream Helm chart (repo/chart/version from config.yaml)
        - repoURL: "{{.chartRepo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.chartVersion}}"
          helm:
            # base file is required; per-cluster override is optional
            ignoreMissingValueFiles: true
            valueFiles:
              # ordered low -> high precedence (last wins)
              - "$values/addons/_base/{{index .path.segments 2}}/values.yaml"                          # common per-addon (define once)
              - "$values/addons/{{index .path.segments 1}}/{{index .path.segments 2}}/values.yaml"     # per-cluster override
        # Source 2: our values repo (ref only — a ref source must not set chart)
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: HEAD
          ref: values
      destination:
        name: "{{index .path.segments 1}}"       # route to the cluster in the path
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true                 # required: large CRDs (cert-manager) exceed the annotation limit
