# DRY cluster add-ons. Definitions live ONCE in addons/catalog/<addon>/.
# Enablement lives on each cluster Secret as a label: enable-<addon>: "true".
# Optional per-cluster value overrides: addons/overrides/<cluster>/<addon>/values.yaml.
#
# matrix(catalog git-files × clusters) produces every (addon, cluster) pair; the
# Post-Selector (spec.selector) drops pairs the cluster didn't opt into. You cannot
# template a matchLabels KEY, so this cartesian + post-selector is the supported way.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/kanzalqalandri/platform-config
              revision: HEAD
              files:
                - path: "addons/catalog/*/config.yaml"     # gen1: catalog -> chart ref + .path.basename = addon
          - clusters:                                       # gen2: whole fleet
              values:
                # compute per-(cluster,addon) enable flag from the cluster's enable-<addon> label
                enabled: '{{ $a := .path.basename }}{{ if hasKey .metadata.labels (printf "enable-%s" $a) }}{{ index .metadata.labels (printf "enable-%s" $a) }}{{ else }}false{{ end }}'
  # POST-SELECTOR: keep only the pairs the cluster enabled
  selector:
    matchExpressions:
      - key: enabled
        operator: In
        values: ["true"]
  template:
    metadata:
      name: "addon-{{.name}}-{{.path.basename}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{.chartRepo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.chartVersion}}"
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - "$values/addons/catalog/{{.path.basename}}/values.yaml"                 # base (defined once)
              - "$values/addons/overrides/{{.name}}/{{.path.basename}}/values.yaml"     # optional per-cluster override
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: HEAD
          ref: values
      destination:
        name: "{{.name}}"
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
