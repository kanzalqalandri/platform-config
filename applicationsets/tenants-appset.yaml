# Tenant plane — mirrors the addons layout: tenants/<cluster>/<tenant>/<app>/.
# One appset for the whole fleet, applied to the central hub. Cluster is taken
# from the path (no destinationCluster field needed). Add a tenant = add a dir;
# put it on another cluster = put the dir under that cluster.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/kanzalqalandri/platform-config
        revision: HEAD
        files:
          - path: "tenants/*/*/*/config.yaml"    # tenants/<cluster>/<tenant>/<app>/config.yaml
  template:
    metadata:
      # segments: 0=tenants 1=<cluster> 2=<tenant> 3=<app>
      name: "{{index .path.segments 1}}-{{index .path.segments 2}}-{{index .path.segments 3}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{.appRepoURL}}"
          targetRevision: "{{.chartRevision}}"
          path: "{{.helmPath}}"
          helm:
            # per-cluster/per-app base files are optional — skip any that don't exist
            ignoreMissingValueFiles: true
            valueFiles:
              # ordered low -> high precedence (last wins)
              - "$values/tenants/_base/values.yaml"                                             # global
              - "$values/tenants/_base/{{index .path.segments 3}}/values.yaml"                   # global per-app
              - "$values/tenants/{{index .path.segments 1}}/_base/values.yaml"                   # per-cluster (all tenants)
              - "$values/tenants/{{index .path.segments 1}}/_base/{{index .path.segments 3}}/values.yaml"  # per-cluster per-app
              - "$values/{{.path.path}}/values.yaml"                                             # per-tenant
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: HEAD
          ref: values
      destination:
        name: "{{index .path.segments 1}}"          # cluster segment from the path
        namespace: "tenant-{{index .path.segments 2}}"  # dir is the bare tenant id; ns keeps a tenant- prefix
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            app.kubernetes.io/managed-by: argocd
        syncOptions:
          - CreateNamespace=true
