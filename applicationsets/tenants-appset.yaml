# Tenant plane — mirrors the addons layout: tenants/<cluster>/<tenant>/<app>/.
# One appset for the whole fleet, applied to the central hub. Cluster is taken
# from the path (no destinationCluster field needed). Add a tenant = add a dir;
# put it on another cluster = put the dir under that cluster.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/kanzalqalandri/platform-config
        revision: HEAD
        files:
          - path: "tenants/*/*/*/config.yaml"    # tenants/<cluster>/<tenant>/<app>/config.yaml
  template:
    metadata:
      # segments: 0=tenants 1=<cluster> 2=<tenant> 3=<app>
      name: "{{index .path.segments 1}}-{{index .path.segments 2}}-{{index .path.segments 3}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{.appRepoURL}}"
          targetRevision: "{{.chartRevision}}"
          path: "{{.helmPath}}"
          helm:
            valueFiles:
              - "$values/tenants/_base/values.yaml"
              - "$values/tenants/_base/{{index .path.segments 3}}/values.yaml"
              - "$values/{{.path.path}}/values.yaml"
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: HEAD
          ref: values
      destination:
        name: "{{index .path.segments 1}}"        # cluster segment from the path
        namespace: "{{index .path.segments 2}}"   # tenant segment = namespace
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            app.kubernetes.io/managed-by: argocd
        syncOptions:
          - CreateNamespace=true
