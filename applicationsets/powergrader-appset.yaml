# PowerGrader plane — a new classification parallel to tenants/ and addons/,
# keyed by ENVIRONMENT: powergrader/<cluster>/<env>/<app>/.
# Cluster placement (c2 = qa cluster hosts dev+qa; c3 = prod cluster hosts prod)
# is expressed by which <cluster> directory each env lives under.
# Routes by the <cluster> path segment, like the tenants appset.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: powergrader
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/kanzalqalandri/platform-config
        revision: main
        files:
          - path: "powergrader/*/*/*/config.yaml"   # powergrader/<cluster>/<env>/<app>/config.yaml
  template:
    metadata:
      # segments: 0=powergrader 1=<cluster> 2=<env> 3=<app>
      name: "powergrader-{{index .path.segments 2}}-{{index .path.segments 3}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{.appRepoURL}}"
          targetRevision: "{{.chartRevision}}"
          path: "{{.helmPath}}"
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              # optional base layers, then the per-env leaf (last wins)
              - "$values/powergrader/_base/values.yaml"
              - "$values/powergrader/_base/{{index .path.segments 3}}/values.yaml"
              - "$values/{{.path.path}}/values.yaml"
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: main
          ref: values
      destination:
        name: "{{index .path.segments 1}}"                # cluster from the path
        namespace: "powergrader-{{index .path.segments 2}}"  # powergrader-dev / -qa / -prod
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            app.kubernetes.io/managed-by: argocd
        syncOptions:
          - CreateNamespace=true
