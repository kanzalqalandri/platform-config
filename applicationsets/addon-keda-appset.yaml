# Per-add-on ApplicationSet — fully file-driven, no cluster labels.
# gen1 = catalog (chart ref, defined once). gen2 = per-cluster enable files
# (addons/clusters/<cluster>/keda.yaml); a file's existence enables keda on
# that cluster, and its chartVersion sets the per-cluster version.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addon-keda
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/kanzalqalandri/platform-config
              revision: HEAD
              files:
                - path: "addons/catalog/keda/config.yaml"       # chartRepo, chart, namespace, syncWave
          - git:
              repoURL: https://github.com/kanzalqalandri/platform-config
              revision: HEAD
              files:
                - path: "addons/clusters/*/keda.yaml"            # cluster, chartVersion (existence = enabled)
  template:
    metadata:
      name: "addon-{{.cluster}}-keda"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{.chartRepo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.chartVersion}}"
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - "$values/addons/catalog/keda/values.yaml"
              - "$values/addons/overrides/{{.cluster}}/keda/values.yaml"
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: HEAD
          ref: values
      destination:
        name: "{{.cluster}}"
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
