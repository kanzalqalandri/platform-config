# Per-add-on ApplicationSet. Add-on defined ONCE here (chart ref) + addons/catalog/keda/values.yaml (base).
# To run it on a cluster, create ONE file: addons/clusters/<cluster>/keda.yaml
#   (existence = enabled; optional 'version:' pins a per-cluster version; optional 'values:' overrides).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addon-keda
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/kanzalqalandri/platform-config
        revision: HEAD
        files:
          - path: "addons/clusters/*/keda.yaml"
  template:
    metadata:
      name: "addon-{{.path.basename}}-keda"
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: https://kedacore.github.io/charts
          chart: keda
          targetRevision: '{{ dig "version" "2.20.1" . }}'
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - "$values/addons/catalog/keda/values.yaml"
            values: |
              {{ toYaml (dig "values" (dict) .) }}
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: HEAD
          ref: values
      destination:
        name: "{{.path.basename}}"
        namespace: keda
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
