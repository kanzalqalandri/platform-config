# Per-add-on ApplicationSet (one per add-on, NOT per cluster). DRY:
# chart ref + base values live once in addons/catalog/cert-manager/.
# Enable on a cluster by labelling its Secret: enable-cert-manager: "true".
# Optional per-cluster override: addons/overrides/<cluster>/cert-manager/values.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addon-cert-manager
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - git:                                   # catalog entry -> chart ref (defined once)
              repoURL: https://github.com/kanzalqalandri/platform-config
              revision: HEAD
              files:
                - path: "addons/catalog/cert-manager/config.yaml"
          - clusters:                              # only clusters that opted in
              selector:
                matchLabels:
                  enable-cert-manager: "true"
  template:
    metadata:
      name: "addon-{{.name}}-cert-manager"
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{.chartRepo}}"
          chart: "{{.chart}}"
          targetRevision: "{{.chartVersion}}"
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - "$values/addons/catalog/cert-manager/values.yaml"
              - "$values/addons/overrides/{{.name}}/cert-manager/values.yaml"
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: HEAD
          ref: values
      destination:
        name: "{{.name}}"
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
