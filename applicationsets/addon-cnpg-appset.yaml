# Per-add-on ApplicationSet. Add-on defined ONCE here (chart ref) + addons/catalog/cnpg/values.yaml (base).
# To run it on a cluster, create ONE file: addons/clusters/<cluster>/cnpg.yaml
#   (existence = enabled; optional 'version:' pins a per-cluster version; optional 'values:' overrides).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addon-cnpg
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/kanzalqalandri/platform-config
        revision: HEAD
        files:
          - path: "addons/clusters/*/cnpg.yaml"
  template:
    metadata:
      name: "addon-{{.path.basename}}-cnpg"
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: https://cloudnative-pg.github.io/charts
          chart: cloudnative-pg
          targetRevision: '{{ dig "version" "0.29.0" . }}'
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - "$values/addons/catalog/cnpg/values.yaml"
            values: |
              {{ toYaml (dig "values" (dict) .) }}
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: HEAD
          ref: values
      destination:
        name: "{{.path.basename}}"
        namespace: cnpg-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
