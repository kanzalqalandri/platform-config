# DEV hub overlay — replaces the REGION sentinel in the 4 region-bearing
# generator globs. ⚠ JSON6902 patches address list items BY INDEX: if anyone
# reorders/inserts a generator or a files entry in base, these paths silently
# point at the wrong element (or error). This fragility is the main argument
# against the kustomize variant — see hubs-kustomize/README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target: {kind: ApplicationSet, name: cluster-addons}
    patch: |-
      # tier-addons matrix, child-1: this region's cluster registry
      - op: replace
        path: /spec/generators/0/matrix/generators/0/git/files/0/path
        value: "clusters/dev/*/config.yaml"
      # oneoffs matrix, child-2: this region's placement files
      - op: replace
        path: /spec/generators/1/matrix/generators/1/git/files/0/path
        value: "addons/values/oneoffs/dev/*/{{.path.basename}}/values.yaml"
  - target: {kind: ApplicationSet, name: tenants}
    patch: |-
      - op: replace
        path: /spec/generators/0/matrix/generators/0/git/files/0/path
        value: "clusters/dev/*/config.yaml"
  - target: {kind: ApplicationSet, name: powergrader}
    patch: |-
      - op: replace
        path: /spec/generators/0/matrix/generators/0/git/files/0/path
        value: "clusters/dev/*/config.yaml"
