# BASE (kustomize comparison) — REGION is a sentinel, never applied directly.
# Each overlay (hubs-kustomize/overlays/<region>) patches the region-bearing
# generator globs. Compare with hubs/chart (Helm) — see hubs-kustomize/README.md.
# Tenant plane, scoped to THIS hub's region (REGION).
# Now a matrix: child-1 = this region's cluster registry, child-2 = the tenant
# leaves living on those clusters. Tenant paths are unchanged
# (tenants/<cluster>/<tenant>/<app>) — the registry join is what scopes them,
# and it also exposes {cloud, role} params to tenant apps for future tiers.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/kanzalqalandri/platform-config
              revision: main
              pathParamPrefix: cluster
              files:
                - path: "clusters/REGION/*/config.yaml"
          - git:
              repoURL: https://github.com/kanzalqalandri/platform-config
              revision: main
              files:
                - path: "tenants/{{.cluster.path.basename}}/*/*/config.yaml"
  template:
    metadata:
      # segments: 0=tenants 1=<cluster> 2=<tenant> 3=<app>  (unchanged)
      name: "{{index .path.segments 1}}-{{index .path.segments 2}}-{{index .path.segments 3}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: "{{.appRepoURL}}"
          targetRevision: "{{.chartRevision}}"
          path: "{{.helmPath}}"
          helm:
            # per-cluster/per-app base files are optional — skip any that don't exist
            ignoreMissingValueFiles: true
            valueFiles:
              # ordered low -> high precedence (last wins)
              - "$values/tenants/_base/values.yaml"
              - "$values/tenants/_base/{{index .path.segments 3}}/values.yaml"
              - "$values/tenants/{{index .path.segments 1}}/_base/values.yaml"
              - "$values/tenants/{{index .path.segments 1}}/_base/{{index .path.segments 3}}/values.yaml"
              - "$values/{{.path.path}}/values.yaml"
        - repoURL: https://github.com/kanzalqalandri/platform-config
          targetRevision: main
          ref: values
      destination:
        name: "{{index .path.segments 1}}"
        namespace: "tenant-{{index .path.segments 2}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            app.kubernetes.io/managed-by: argocd
        syncOptions:
          - CreateNamespace=true
