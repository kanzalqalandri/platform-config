name: hub-appset drift check
on:
  pull_request:
    paths: ["hubs/**"]
  push:
    branches: [main]
    paths: ["hubs/**"]
jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regions' appsets must be identical modulo the region token
        run: bash bin/check-hub-drift.sh
